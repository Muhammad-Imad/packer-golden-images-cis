name: packer-ci

# Validates the golden-image templates on every push and PR.
# No AWS credentials are required: `packer validate` performs a full
# syntactic + semantic check (including the source_ami_filter shape) without
# launching any instances.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKER_VERSION: "1.11.2"

jobs:
  fmt:
    name: packer fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Check HCL formatting
        run: packer fmt -check -recursive .

  validate:
    name: validate (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        target:
          - amazon-ebs.ubuntu
          - amazon-ebs.rhel
          - amazon-ebs.amazon_linux
          - windows.windows_2022
          - windows.windows_2025
    steps:
      - uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: packer init
        run: packer init .

      - name: packer validate (${{ matrix.target }})
        run: |
          packer validate \
            -var-file=example.pkrvars.hcl \
            -only="${{ matrix.target }}" \
            .

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on hardening scripts
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          find scripts ubuntu rhel amazon-linux -name '*.sh' -print0 | \
            xargs -0 -r shellcheck --severity=warning || true
